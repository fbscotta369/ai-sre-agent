apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-application-controller
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-application-controller
rules:
- apiGroups:
  - "*"
  resources:
  - "*"
  verbs:
  - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-application-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-application-controller
subjects:
- kind: ServiceAccount
  name: argocd-application-controller
  namespace: argocd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  resource.customizations: |
    argoproj.io/Application:
      health.lua: |
        hs = {}
        hs.status = "Progressing"
        hs.message = ""
        if obj.status ~= nil then
          if obj.status.health ~= nil then
            hs.status = obj.status.health.status
            if obj.status.health.message ~= nil then
              hs.message = obj.status.health.message
            end
          end
        return hs
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
type: Opaque
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd
spec:
  ports:
  - name: http
    port: 80
    protocol: TCP
    targetPort: 8080
  - name: https
    port: 443
    protocol: TCP
    targetPort: 8080
  selector:
    app.kubernetes.io/name: argocd-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-server
    spec:
      serviceAccountName: argocd-application-controller
      containers:
      - name: argocd-server
        image: argoproj/argocd:v2.10.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        - containerPort: 8083
        env:
        - name: ARGOCD_SERVER_INSECURE
          value: "true"
        - name: ARGOCD_SERVER_REPLICAS
          value: "1"
        - name: ARGOCD_repo_server
          value: "argocd-repo-server:8081"
        - name: ARGOCD_DEX_SERVER
          value: "argocd-dex-server"
        - name: ARGOCD_DISCOVERY_LEVEL
          value: "10"
        volumeMounts:
        - mountPath: /shared
          name: static-files
        - mountPath: /home/argocd/etc
          name: argocd-cm
          subPath: config
        - mountPath: /app/config/tls
          name: tls-certs
      volumes:
      - emptyDir: {}
        name: static-files
      - configMap:
          name: argocd-cm
        name: argocd-cm
      - secret:
          secretName: argocd-secret
          optional: true
        name: tls-certs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-repo-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-repo-server
    spec:
      serviceAccountName: argocd-application-controller
      containers:
      - name: argocd-repo-server
        image: argoproj/argocd:v2.10.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081
        - containerPort: 8084
        env:
        - name: ARGOCD_GIT_MODULES_ENABLED
          value: "true"
        - name: ARGOCD_GIT_STRICT_SSH_KNOWN_HOSTS
          value: "false"
        - name: ARGOCD_GIT_TIMEOUT
          value: "60s"
        - name: ARGOCD_REPO_CACHE_SIZE
          value: "1024"
        volumeMounts:
        - mountPath: /usr/local/share/argocd
          name: argocd-cache-dir
      volumes:
      - emptyDir:
          sizeLimit: 512Mi
        name: argocd-cache-dir
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-application-controller
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-application-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-application-controller
    spec:
      serviceAccountName: argocd-application-controller
      containers:
      - name: argocd-application-controller
        image: argoproj/argocd:v2.10.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
        - containerPort: 8083
        env:
        - name: ARGOCD_CONTROLLER_REPLICAS
          value: "1"
        - name: ARGOCD_REPO_SERVER
          value: "argocd-repo-server:8081"
        - name: ARGOCD_DEX_SERVER
          value: "argocd-dex-server:5556"
        - name: ARGOCD_LOGLEVEL
          value: "info"
        - name: ARGOCD_LOGFORMAT
          value: "text"
        - name: ARGOCD_ANALYTICS_ENABLED
          value: "false"
        - name: ARGOCD_DEFAULT_CACHE_EXPIRATION
          value: "24h0m0s"
        - name: ARGOCD_JWT_MAX_CLOCK_SKEW
          value: "3m"
        - name: ARGOCD_KUBE_CACHE_TTL
          value: "60s"
        - name: ARGOCD_K8S_CLIENT_RATE_LIMIT_QPS
          value: "100"
        - name: ARGOCD_K8S_CLIENT_RATE_LIMIT_BURST
          value: "50"
        - name: ARGOCD_DYNAMIC_CLUSTER_CACHE_THROTTLE_DELAY
          value: "30s"
        - name: ARGOCD_RECONCILIATION_TIMEOUT
          value: "180s"
        - name: ARGOCD_DIFF_TIMEOUT
          value: "30s"
        - name: ARGOCD_SYNC_TIMEOUT
          value: "300s"
        - name: ARGOCD_RESOURCE_OVERRIDE_ENABLED
          value: "true"
        - name: ARGOCD_APPLICATION_SET_NAMESPACES
          value: "*"
        - name: ARGOCD_GLOBAL_PROJECTS
          value: "*"
        - name: ARGOCD_SOURCE_ROUTE_POLICY
          value: "always"
        - name: ARGOCD_SHELL_EXECUTABLE_NAME
          value: "/bin/sh"
        - name: ARGOCD_EXEC_TIMEOUT
          value: "30s"
        command:
        - argocd-application-controller
        - --status-processors
        - "20"
        - --operation-processors
        - "10"
        - --app-resync
        - "180"
        - --app-hard-resync
        - "60"
        - --repo-server-timeout
        - "30s"
        - --server
        - "0.0.0.0"
        - --port
        - "8082"
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-repo-server
  namespace: argocd
spec:
  ports:
  - name: repo-server
    port: 8081
    protocol: TCP
    targetPort: 8081
  selector:
    app.kubernetes.io/name: argocd-repo-server
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-application-controller
  namespace: argocd
spec:
  ports:
  - name: controller
    port: 8082
    protocol: TCP
    targetPort: 8082
  selector:
    app.kubernetes.io/name: argocd-application-controller
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-dex-server
  namespace: argocd
spec:
  ports:
  - name: http
    port: 5556
    protocol: TCP
    targetPort: 5556
  - name: grpc
    port: 5557
    protocol: TCP
    targetPort: 5557
  selector:
    app.kubernetes.io/name: argocd-dex-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-dex-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-dex-server
    spec:
      serviceAccountName: argocd-application-controller
      containers:
      - name: dex
        image: ghcr.io/dexidp/dex:v2.37.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5556
        - containerPort: 5557
        volumeMounts:
        - mountPath: /shared
          name: static-files
        - mountPath: /etc/dex/cfg
          name: config
        env:
        - name: ARGOCD_DEX_ENABLED
          value: "true"
        - name: ARGOCD_DEX_VERSION
          value: "v2.37.0"
      volumes:
      - emptyDir: {}
        name: static-files
      - configMap:
          name: argocd-cm
        name: config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-app-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-config
    app.kubernetes.io/part-of: argocd
data:
  # UPDATE THIS to your fork URL before applying!
  repo.url: https://github.com/anomalyco/ai-sre-agent
  repo.path: k8s/manifests
  repo.revision: HEAD
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-lab-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/anomalyco/ai-sre-agent
    targetRevision: HEAD
    path: k8s/manifests
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
